name: Generate Go from remote protos

on:
  workflow_dispatch:
    inputs:
      proto_repo:
        description: 'GitHub repo slug with .proto files (e.g. owner/ap2-protos)'
        required: true
        default: 'shaminabd/ap2-protos'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.proto_repo }}
          path: proto-src
          token: ${{ secrets.GH_PROTO_READ_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Install Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Generate
        run: |
          export PATH="${PATH}:$(go env GOPATH)/bin"
          mkdir -p apiv1
          protoc \
            --go_out=. --go_opt=module=github.com/shaminabd/ap2-contracts-go \
            --go-grpc_out=. --go-grpc_opt=module=github.com/shaminabd/ap2-contracts-go \
            -I proto-src -I /usr/local/include \
            proto-src/orderpayment/v1/order_payment.proto
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apiv1
          git diff --staged --quiet || (git commit -m "chore: regenerate protobuf" && git push)
